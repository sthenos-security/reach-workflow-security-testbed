name: Poutine-derived malformed if fail-open

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  malformed-release-gate:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Malformed guard that should not protect release authority
        if: github.event.pull_request.author_association = 'MEMBER'
        run: |
          echo "simulated privileged release after malformed if guard"
          gh release create "dry-run-${{ github.event.pull_request.head.ref }}" dist/*
