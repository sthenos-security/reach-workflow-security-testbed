name: Fixture - secret authority exposure

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write

jobs:
  low-trust-secret-authority:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Simulated package publishing token boundary
        run: |
          echo "simulated npm publish with token ${{ secrets.NPM_TOKEN }}"
