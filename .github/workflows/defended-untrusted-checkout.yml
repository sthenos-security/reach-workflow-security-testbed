name: Defended - trusted checkout boundary

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  checkout-base-only:
    if: ${{ github.event.pull_request.author_association == 'MEMBER' || github.event.pull_request.author_association == 'OWNER' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted base ref only
        uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac
      - name: Metadata-only validation
        run: |
          echo "trusted base checkout only"
