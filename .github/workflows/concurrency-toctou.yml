name: concurrency toctou

on: pull_request_target

permissions:
  contents: write

concurrency: shared-${{ github.event.pull_request.head.ref }}

jobs:
  release:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/cache@3df4ab11eba7bda6032a0b82a6bb43b11571feac
        with:
          path: build/
          key: shared-build
      - uses: actions/upload-artifact@3df4ab11eba7bda6032a0b82a6bb43b11571feac
        with:
          name: build
          path: build/
      - run: gh release create test build/*
