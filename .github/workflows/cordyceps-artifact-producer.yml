name: Fixture - Cordyceps artifact producer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-low-trust-artifact:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Simulate attacker-influenced artifact
        run: |
          mkdir -p dist
          echo "${{ github.event.pull_request.title }}" > dist/release.txt
      - uses: actions/upload-artifact@v4
        with:
          name: candidate-release
          path: dist/

