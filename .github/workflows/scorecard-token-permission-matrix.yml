name: Scorecard Token Permission Matrix

on: pull_request_target

permissions:
  contents: read

jobs:
  read-only-release:
    if: ${{ false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: gh release create v1 dist/*

  sarif-only:
    if: ${{ false }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: github/codeql-action/upload-sarif@0123456789abcdef0123456789abcdef01234567
        with:
          sarif_file: results.sarif

  package-write:
    if: ${{ false }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - run: npm publish
