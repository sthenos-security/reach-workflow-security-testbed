name: Poutine-derived debug logging exposure

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  debug-secret-amplifier:
    if: ${{ false }}
    runs-on: ubuntu-latest
    env:
      ACTIONS_STEP_DEBUG: "true"
    steps:
      - name: Simulated secret in debug channel
        run: |
          echo "::debug::simulated token boundary ${{ secrets.NPM_TOKEN }}"

