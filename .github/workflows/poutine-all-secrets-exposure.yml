name: Poutine-derived all secrets exposure

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write

jobs:
  wildcard-secret-authority:
    if: ${{ false }}
    runs-on: ubuntu-latest
    env:
      ALL_REPO_SECRETS: ${{ toJSON(secrets) }}
    steps:
      - name: Simulated wildcard secret exposure
        run: |
          echo "simulated packaging step received wildcard secret object"
          echo "$ALL_REPO_SECRETS" > simulated-secret-authority.txt

